<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="c">
      <circle cx="100" cy="100" r="99"/>
    </clipPath>
  </defs>
  <g clip-path="url(#c)">
    <rect width="200" height="200" fill="#000"/>
    <!-- Blue (Echo) — 2 peaks, flat base at y=112 -->
    <polygon points="0,68 50,35 92,58 142,28 200,64 200,112 0,112" fill="#4a90d2"/>
    <!-- Red (Alpha) — 2 peaks poking into blue zone, flat base at y=148 -->
    <polygon points="0,110 45,88 100,110 155,88 200,110 200,148 0,148" fill="#dd2020"/>
    <!-- Black divider: blue / red -->
    <rect x="0" y="110" width="200" height="5" fill="#000"/>
    <!-- Green (Delta) — 2 peaks poking into red zone, flat base at y=182 -->
    <polygon points="0,148 58,128 100,148 142,128 200,148 200,182 0,182" fill="#55cc44"/>
    <!-- Black divider: red / green -->
    <rect x="0" y="148" width="200" height="5" fill="#000"/>
  </g>
</svg>
