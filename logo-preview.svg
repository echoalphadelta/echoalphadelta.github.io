<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="c">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>
  <g clip-path="url(#c)">
    <rect width="200" height="200" fill="#000"/>

    <!-- Blue (Echo) band -->
    <rect x="0" y="32" width="200" height="88" fill="#4a9eff"/>
    <!-- Blue chevrons — 2 peaks -->
    <polygon points="4,120 48,56 92,120" fill="#000"/>
    <polygon points="88,120 136,44 184,120" fill="#000"/>

    <!-- Black divider -->
    <rect x="0" y="120" width="200" height="8" fill="#000"/>

    <!-- Red (Alpha) band -->
    <rect x="0" y="128" width="200" height="40" fill="#ff4a4a"/>
    <!-- Red chevron — 1 wide peak -->
    <polygon points="20,168 100,128 180,168" fill="#000"/>

    <!-- Black divider -->
    <rect x="0" y="168" width="200" height="8" fill="#000"/>

    <!-- Green (Delta) band -->
    <rect x="0" y="176" width="200" height="24" fill="#4aff7a"/>
    <!-- Green chevron -->
    <polygon points="60,200 100,174 140,200" fill="#000"/>
  </g>
</svg>
