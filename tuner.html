<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuner — Echo Alpha Delta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; background: #000; }
* { box-sizing: border-box; }
body { color: #f0ede8; font-family: 'Share Tech Mono', monospace; line-height: 1.85; }
.page { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
.back-link { display: inline-block; font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: #f5a623; text-decoration: none; padding: 0.5rem 1.2rem; border: 1px solid rgba(245,166,35,0.25); border-radius: 2rem; margin-bottom: 40px; transition: all 0.3s ease; }
.back-link:hover { color: #ffc85c; border-color: rgba(245,166,35,0.5); box-shadow: 0 0 12px rgba(245,166,35,0.2); }
h1 { font-family: 'Space Mono', monospace; font-size: 1.5rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #f5a623; text-shadow: 0 0 16px rgba(245,166,35,0.4); margin: 0 0 8px 0; }
.subtitle { font-size: 0.78rem; color: rgba(240,237,232,0.42); margin: 0 0 44px; letter-spacing: 0.04em; }
.ref-label { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,166,35,0.5); margin-bottom: 16px; }
.strings-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.str-btn {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(245,166,35,0.06);
  border: 1.5px solid rgba(245,166,35,0.26);
  color: #f5a623; font-family: 'Space Mono', monospace; font-weight: 700;
  cursor: pointer; transition: all 0.2s ease;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; line-height: 1; padding: 0;
}
.str-btn .sn { font-size: 1.1rem; color: #4aff7a; }
.str-btn .sf { font-size: 0.46rem; opacity: 0.48; letter-spacing: 0.03em; }
.str-btn:hover { background: rgba(245,166,35,0.13); border-color: rgba(245,166,35,0.52); box-shadow: 0 0 14px rgba(245,166,35,0.22); }
.str-btn.playing { background: rgba(74,255,122,0.1); border-color: rgba(74,255,122,0.7); box-shadow: 0 0 22px rgba(74,255,122,0.35); }
@media (max-width: 520px) {
  h1 { font-size: 1.1rem; }
  .page { padding: 24px 16px 60px; }
  .str-btn { width: 56px; height: 56px; }
  .str-btn .sn { font-size: 0.9rem; }
  .strings-row { gap: 10px; }
}
</style>
</head>
<body>
<div class="page">
  <a href="index.html" class="back-link">&#8592; Back to Map</a>
  <h1>Tuner</h1>
  <p class="subtitle">Tap a string to hear its reference pitch.</p>
  <div class="ref-label">Reference Tones</div>
  <div class="strings-row">
    <button class="str-btn" data-hz="82.41"  onclick="playRef(this)"><span class="sn">E</span><span class="sf">82 Hz</span></button>
    <button class="str-btn" data-hz="110"    onclick="playRef(this)"><span class="sn">A</span><span class="sf">110 Hz</span></button>
    <button class="str-btn" data-hz="146.83" onclick="playRef(this)"><span class="sn">D</span><span class="sf">147 Hz</span></button>
    <button class="str-btn" data-hz="196"    onclick="playRef(this)"><span class="sn">G</span><span class="sf">196 Hz</span></button>
    <button class="str-btn" data-hz="246.94" onclick="playRef(this)"><span class="sn">B</span><span class="sf">247 Hz</span></button>
    <button class="str-btn" data-hz="329.63" onclick="playRef(this)"><span class="sn">e</span><span class="sf">330 Hz</span></button>
  </div>
</div>
<script>
var refBtn = null, refOsc = null, refCtx = null;

function playRef(btn) {
  if (refOsc) { try { refOsc.stop(); } catch(e) {} }
  if (refCtx) { try { refCtx.close(); } catch(e) {} }
  if (refBtn) refBtn.classList.remove('playing');

  var ctx = new (window.AudioContext || window.webkitAudioContext)();

  function start() {
    var osc  = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = parseFloat(btn.dataset.hz);
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.45, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3.0);
    osc.start();
    osc.stop(ctx.currentTime + 3.1);
    refOsc = osc; refCtx = ctx; refBtn = btn;
    btn.classList.add('playing');
    osc.onended = function() {
      if (refBtn === btn) { refBtn = null; btn.classList.remove('playing'); }
      try { ctx.close(); } catch(e) {}
    };
  }

  if (ctx.state === 'running') {
    start();
  } else {
    ctx.resume().then(start);
  }
}
</script>
</body>
</html>
