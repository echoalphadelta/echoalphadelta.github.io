<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scales — Echo Alpha Delta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; background: #000; }
* { box-sizing: border-box; }
body { color: #f0ede8; font-family: 'Share Tech Mono', monospace; font-weight: 400; line-height: 1.85; }

.page { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

.back-link {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #f5a623;
  text-decoration: none;
  padding: 0.5rem 1.2rem;
  border: 1px solid rgba(245,166,35,0.25);
  border-radius: 2rem;
  margin-bottom: 40px;
  transition: all 0.3s ease;
}
.back-link:hover { color: #ffc85c; border-color: rgba(245,166,35,0.5); box-shadow: 0 0 12px rgba(245,166,35,0.2); }

h1 {
  font-family: 'Space Mono', monospace;
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #f5a623;
  text-shadow: 0 0 16px rgba(245,166,35,0.4), 0 0 40px rgba(245,166,35,0.15);
  margin: 0 0 32px 0;
}

h2 {
  font-family: 'Space Mono', monospace;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #f5a623;
  margin: 0 0 14px 0;
}

p { font-size: 0.88rem; color: #c8c4be; margin: 0 0 20px 0; }
p.intro { color: #e0ddd8; }

.scale-section {
  margin-bottom: 60px;
  padding-bottom: 50px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.scale-section:last-child { border-bottom: none; }

.diag-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin: 20px 0 14px;
}

.diag-card { display: flex; flex-direction: column; }

.diag-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.diag-map { margin-top: 4px; }
.diag-map .diag-label { color: #f5a623; margin-bottom: 6px; }

@media (max-width: 620px) {
  .diag-row { grid-template-columns: 1fr; }
  h1 { font-size: 1.1rem; }
  .page { padding: 24px 16px 60px; }
}
</style>
</head>
<body>
<div class="page">

  <a href="index.html" class="back-link">← Back to Map</a>

  <h1>Scales</h1>
  <p class="intro">Each scale is mapped into all three shapes across the neck.</p>

  <div id="content"></div>

</div>
<script>
const STR_OPEN  = [4, 9, 2, 7, 11, 4]; // E A D G B e (low→high)
const STR_THICK = [3.2, 2.4, 1.7, 1.2, 0.8, 0.5]; // low E → high e

const SHAPE_MIN_STRING = { echo: 0, alpha: 1, delta: 2 };
const SHAPE_COLORS     = { echo: '#4a9eff', alpha: '#ff4a4a', delta: '#4aff7a' };
const NUM_FRETS = 4;

// si=0 (low E) → bottom, si=5 (high e) → top
function syFn(MT, SH) {
  return si => MT + (5 - si) * SH;
}

// ── Individual shape window ───────────────────────────────────────────────────
function shapeSVG(rootPc, intervals, color, startFret, numFrets, minStr) {
  const W = 280, H = 90;
  const ML = startFret === 0 ? 24 : 10;
  const MR = 8, MT = 8, MB = 8;
  const FW = (W - ML - MR) / numFrets;
  const SH = (H - MT - MB) / 5;
  const sy = syFn(MT, SH);

  let s = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
  s += `<rect width="${W}" height="${H}" fill="#0a0a0a" rx="2"/>`;

  // Strings
  for (let si = 0; si < 6; si++) {
    const y   = sy(si).toFixed(1);
    const dim = si < minStr;
    s += `<line x1="${ML}" y1="${y}" x2="${W - MR}" y2="${y}"
      stroke="${dim ? '#141414' : '#383838'}"
      stroke-width="${dim ? 0.5 : STR_THICK[si]}"/>`;
  }

  // Nut
  if (startFret === 0) {
    s += `<line x1="${ML}" y1="${MT - 2}" x2="${ML}" y2="${H - MB + 2}" stroke="#999" stroke-width="3"/>`;
  }

  // Fret lines
  for (let f = 0; f <= numFrets; f++) {
    const x = (ML + f * FW).toFixed(1);
    s += `<line x1="${x}" y1="${MT}" x2="${x}" y2="${H - MB}" stroke="#1c1c1c" stroke-width="1"/>`;
  }

  // Position marker dots within window
  [3, 5, 7, 9, 12].forEach(m => {
    if (m > startFret && m <= startFret + numFrets) {
      const x = (ML + (m - startFret - 0.5) * FW).toFixed(1);
      if (m === 12) {
        s += `<circle cx="${x}" cy="${(MT + SH * 1.5).toFixed(1)}" r="2" fill="#1e1e1e"/>`;
        s += `<circle cx="${x}" cy="${(MT + SH * 3.5).toFixed(1)}" r="2" fill="#1e1e1e"/>`;
      } else {
        s += `<circle cx="${x}" cy="${(H / 2).toFixed(1)}" r="2" fill="#1e1e1e"/>`;
      }
    }
  });

  // Scale dots
  const fStart = startFret === 0 ? 0 : startFret + 1;
  for (let f = fStart; f <= startFret + numFrets; f++) {
    for (let si = minStr; si < 6; si++) {
      const pitch = (STR_OPEN[si] + f) % 12;
      const intv  = (pitch - rootPc + 12) % 12;
      if (!intervals.includes(intv)) continue;
      const cx = f === 0 ? ML - 12 : ML + (f - startFret - 0.5) * FW;
      const cy = sy(si);
      s += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="5" fill="${color}" opacity="0.85"/>`;
    }
  }

  s += '</svg>';
  return s;
}

// ── Full neck map ─────────────────────────────────────────────────────────────
function mapSVG(rootPc, intervals) {
  const W = 640, H = 90;
  const ML = 26, MR = 10, MT = 8, MB = 8;
  const NF = 12;
  const FW = (W - ML - MR) / NF;
  const SH = (H - MT - MB) / 5;
  const sy = syFn(MT, SH);

  const re0 = (rootPc - 4 + 12) % 12;
  const ra0 = (rootPc - 9 + 12) % 12;
  const rd0 = (rootPc - 2 + 12) % 12;
  const echoRoots  = [re0, re0 + 12];
  const alphaRoots = [ra0, ra0 + 12];
  const deltaRoots = [rd0, rd0 + 12];

  function claimedBy(f, si) {
    const out = [];
    if (echoRoots.some(r => f >= r && f <= r + 3))             out.push('echo');
    if (si >= 2 && deltaRoots.some(r => f >= r && f <= r + 3)) out.push('delta');
    if (si >= 1 && alphaRoots.some(r => f >= r && f <= r + 3)) out.push('alpha');
    return out;
  }

  function splitDot(cx, cy, r, c1, c2) {
    const [xs, ys, t, b] = [cx.toFixed(1), cy.toFixed(1), (cy-r).toFixed(1), (cy+r).toFixed(1)];
    return (
      `<path d="M ${xs} ${t} A ${r} ${r} 0 0 0 ${xs} ${b} L ${xs} ${ys} Z" fill="${c1}" opacity="0.85"/>` +
      `<path d="M ${xs} ${t} A ${r} ${r} 0 0 1 ${xs} ${b} L ${xs} ${ys} Z" fill="${c2}" opacity="0.85"/>`
    );
  }

  let s = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
  s += `<rect width="${W}" height="${H}" fill="#0a0a0a" rx="2"/>`;

  // Strings
  for (let si = 0; si < 6; si++) {
    const y = sy(si).toFixed(1);
    s += `<line x1="${ML}" y1="${y}" x2="${(ML + NF * FW).toFixed(1)}" y2="${y}"
      stroke="#383838" stroke-width="${STR_THICK[si]}" stroke-linecap="round"/>`;
  }

  // Nut
  s += `<line x1="${ML}" y1="${MT - 2}" x2="${ML}" y2="${H - MB + 2}" stroke="#999" stroke-width="3"/>`;

  // Fret lines
  for (let f = 1; f <= NF; f++) {
    const x = (ML + f * FW).toFixed(1);
    s += `<line x1="${x}" y1="${MT}" x2="${x}" y2="${H - MB}"
      stroke="${f === 12 ? '#444' : '#1c1c1c'}" stroke-width="${f === 12 ? 2 : 1}"/>`;
  }

  // Position marker dots
  [3, 5, 7, 9].forEach(f => {
    s += `<circle cx="${(ML + (f - 0.5) * FW).toFixed(1)}" cy="${(H / 2).toFixed(1)}" r="2.5" fill="#1a1a1a"/>`;
  });
  const x12 = ML + 11.5 * FW;
  s += `<circle cx="${x12.toFixed(1)}" cy="${(MT + SH * 1.5).toFixed(1)}" r="2.5" fill="#1a1a1a"/>`;
  s += `<circle cx="${x12.toFixed(1)}" cy="${(MT + SH * 3.5).toFixed(1)}" r="2.5" fill="#1a1a1a"/>`;

  // Scale dots
  for (let f = 0; f <= 12; f++) {
    for (let si = 0; si < 6; si++) {
      const pitch = (STR_OPEN[si] + f) % 12;
      const intv  = (pitch - rootPc + 12) % 12;
      if (!intervals.includes(intv)) continue;

      const cx = f === 0 ? ML - 13 : ML + (f - 0.5) * FW;
      const cy = sy(si);
      const claimed = claimedBy(f, si);

      if (claimed.length === 0) {
        s += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="5" fill="#555" opacity="0.45"/>`;
      } else if (claimed.length === 1) {
        s += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="5" fill="${SHAPE_COLORS[claimed[0]]}" opacity="0.85"/>`;
      } else {
        s += splitDot(cx, cy, 5, SHAPE_COLORS[claimed[0]], SHAPE_COLORS[claimed[1]]);
      }
    }
  }

  s += '</svg>';
  return s;
}

// ── Section data ──────────────────────────────────────────────────────────────
const SECTIONS = [
  {
    title:     'Minor Pentatonic — F',
    scaleName: 'minor pentatonic',
    key:       'F',
    rootPc:    5,
    intervals: [0, 3, 5, 7, 10],
    copy:      'Five notes, moveable anywhere on the neck. The minor pentatonic sits naturally inside all three shapes. Here it is in F.',
    windows:   { echo: 0, alpha: 7, delta: 2 },
  },
  {
    title:     'Major Pentatonic — B',
    scaleName: 'major pentatonic',
    key:       'B',
    rootPc:    11,
    intervals: [0, 2, 4, 7, 9],
    copy:      'The major pentatonic has a brighter, more open character. The same five-note framework, shifted to a major root. It sits equally well inside each shape. Here it is in B.',
    windows:   { echo: 6, alpha: 1, delta: 8 },
  },
  {
    title:     'Natural Minor — G',
    scaleName: 'natural minor',
    key:       'G',
    rootPc:    7,
    intervals: [0, 2, 3, 5, 7, 8, 10],
    copy:      'Natural minor adds two notes to the minor pentatonic — the second and the sixth — filling in a seven-note picture that covers more of each shape\'s territory. Here it is in G.',
    windows:   { echo: 2, alpha: 9, delta: 4 },
  },
  {
    title:     'Blues Scale — A',
    scaleName: 'blues',
    key:       'A',
    rootPc:    9,
    intervals: [0, 3, 5, 6, 7, 10],
    copy:      'The blues scale takes the minor pentatonic and adds a single passing tone — the flattened fifth. That one extra note creates a characteristic tension and release. Here it is in A.',
    windows:   { echo: 4, alpha: 0, delta: 6 },
  },
];

// ── Render ────────────────────────────────────────────────────────────────────
let html = '';
SECTIONS.forEach(sec => {
  const cards = ['echo', 'alpha', 'delta'].map(shape => {
    const color  = SHAPE_COLORS[shape];
    const label  = shape[0].toUpperCase() + shape.slice(1);
    const minStr = SHAPE_MIN_STRING[shape];
    return `
      <div class="diag-card">
        <div class="diag-label" style="color:${color};">${label} — ${sec.key} ${sec.scaleName}</div>
        ${shapeSVG(sec.rootPc, sec.intervals, color, sec.windows[shape], NUM_FRETS, minStr)}
      </div>`;
  }).join('');

  html += `
    <div class="scale-section">
      <h2>${sec.title}</h2>
      <p>${sec.copy}</p>
      <div class="diag-row">${cards}</div>
      <div class="diag-map">
        <div class="diag-label">Full neck — ${sec.key} ${sec.scaleName}</div>
        ${mapSVG(sec.rootPc, sec.intervals)}
      </div>
    </div>`;
});

document.getElementById('content').innerHTML = html;
</script>
</body>
</html>
