<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scales — Echo Alpha Delta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; background: #000; }
* { box-sizing: border-box; }
body { color: #f0ede8; font-family: 'Share Tech Mono', monospace; font-weight: 400; line-height: 1.85; }

.page { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

.back-link {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #f5a623;
  text-decoration: none;
  padding: 0.5rem 1.2rem;
  border: 1px solid rgba(245,166,35,0.25);
  border-radius: 2rem;
  margin-bottom: 40px;
  transition: all 0.3s ease;
}
.back-link:hover { color: #ffc85c; border-color: rgba(245,166,35,0.5); box-shadow: 0 0 12px rgba(245,166,35,0.2); }

h1 {
  font-family: 'Space Mono', monospace;
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #f5a623;
  text-shadow: 0 0 16px rgba(245,166,35,0.4), 0 0 40px rgba(245,166,35,0.15);
  margin: 0 0 32px 0;
}

h2 {
  font-family: 'Space Mono', monospace;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #f5a623;
  margin: 0 0 14px 0;
}

p { font-size: 0.88rem; color: #c8c4be; margin: 0 0 20px 0; }
p.intro { color: #e0ddd8; }

.scale-section {
  margin-bottom: 60px;
  padding-bottom: 50px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.scale-section:last-child { border-bottom: none; }

.diag-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin: 20px 0 14px;
}

.diag-card { display: flex; flex-direction: column; }

.diag-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.diag-map { margin-top: 4px; }
.diag-map .diag-label { color: #f5a623; margin-bottom: 6px; }

@media (max-width: 620px) {
  .diag-row { grid-template-columns: 1fr; }
  h1 { font-size: 1.1rem; }
  .page { padding: 24px 16px 60px; }
}
</style>
</head>
<body>
<div class="page">

  <a href="index.html" class="back-link">← Back to Map</a>

  <h1>Scales</h1>
  <p class="intro">Each scale is mapped into all three shapes across the neck.</p>

  <div id="content"></div>

</div>
<script>
const STR_OPEN  = [4, 9, 2, 7, 11, 4]; // E A D G B e (low→high)
const STR_THICK = [3.5, 2.7, 1.9, 1.3, 0.9, 0.5];

const SHAPE_MIN_STRING = { echo: 0, alpha: 1, delta: 2 };
const SHAPE_COLORS     = { echo: '#4a9eff', alpha: '#ff4a4a', delta: '#4aff7a' };
const NUM_FRETS = 4;

function syFn(MT, SH) {
  return si => MT + (5 - si) * SH;
}

// ── Individual shape window ───────────────────────────────────────────────────
function shapeSVG(rootPc, intervals, color, startFret, numFrets, minStr, wrap) {
  const H = 90;
  const MR = 6, MT = 8, MB = 8;
  const SH = (H - MT - MB) / 5;
  const sy = syFn(MT, SH);

  // Layout: [ML][EX_W ext section][SEP gap][main section][MR]
  const EX_W   = wrap ? 55 : 0;
  const SEP    = wrap ? 8  : 0;
  const W      = 280 + EX_W + SEP;
  const ML     = wrap ? 8 : (startFret === 0 ? 24 : 10);
  const mainML = ML + EX_W + SEP;
  const FW     = (W - mainML - MR) / numFrets;

  let s = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;

  if (wrap) {
    // Extension: nut + fret-1 slot
    const nutX  = ML + 14;
    const exFW  = EX_W - 14;
    const exEdge = ML + EX_W;
    // Nut line
    s += `<line x1="${nutX}" y1="${MT}" x2="${nutX}" y2="${H - MB}" stroke="#d4cfc8" stroke-width="9"/>`;
    // Right edge of ext (fret 1 → fret 2 boundary)
    s += `<line x1="${exEdge}" y1="${MT}" x2="${exEdge}" y2="${H - MB}" stroke="#666" stroke-width="2"/>`;
    // Strings in ext section
    for (let si = 0; si < 6; si++) {
      const y = sy(si).toFixed(1);
      s += `<line x1="${ML}" y1="${y}" x2="${exEdge}" y2="${y}" stroke="#999" stroke-width="${STR_THICK[si]}" stroke-linecap="round"/>`;
    }
    // Dots for frets 0 and 1
    for (let f = 0; f <= 1; f++) {
      for (let si = minStr; si < 6; si++) {
        if (f === 0 && si === 4) continue;
        const pitch = (STR_OPEN[si] + f) % 12;
        const intv  = (pitch - rootPc + 12) % 12;
        if (!intervals.includes(intv)) continue;
        const cx = f === 0 ? nutX - 12 : nutX + exFW * 0.5;
        const cy = sy(si);
        const r  = intv === 0 ? 6 : 5.5;
        s += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${r}" fill="${color}" opacity="${intv === 0 ? 1 : 0.9}"/>`;
        if (intv === 0) s += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.5" fill="#fff"/>`;
      }
    }
    // Separator dots
    const sepX = exEdge + SEP / 2;
    const sepY = (MT + 2.5 * SH).toFixed(1);
    [-3, 0, 3].forEach(dx => {
      s += `<circle cx="${(sepX + dx).toFixed(1)}" cy="${sepY}" r="1.5" fill="#555"/>`;
    });
  }

  // Main section fret lines
  for (let f = 0; f <= numFrets; f++) {
    const x = (mainML + f * FW).toFixed(1);
    const isNut = !wrap && startFret === 0 && f === 0;
    s += `<line x1="${x}" y1="${MT}" x2="${x}" y2="${H - MB}" stroke="${isNut ? '#d4cfc8' : '#666'}" stroke-width="${isNut ? 9 : 2}"/>`;
  }

  // Main section fret position markers
  [3, 5, 7, 9, 12].forEach(m => {
    if (m > startFret && m <= startFret + numFrets) {
      const x = (mainML + (m - startFret - 0.5) * FW).toFixed(1);
      if (m === 12) {
        s += `<circle cx="${x}" cy="${(MT + SH * 1.5).toFixed(1)}" r="2.5" fill="#ccc"/>`;
        s += `<circle cx="${x}" cy="${(MT + SH * 3.5).toFixed(1)}" r="2.5" fill="#ccc"/>`;
      } else {
        s += `<circle cx="${x}" cy="${(MT + 2.5 * SH).toFixed(1)}" r="2.5" fill="#ccc"/>`;
      }
    }
  });

  // Main section strings
  for (let si = 0; si < 6; si++) {
    const y = sy(si).toFixed(1);
    s += `<line x1="${mainML}" y1="${y}" x2="${(W - MR).toFixed(1)}" y2="${y}" stroke="#999" stroke-width="${STR_THICK[si]}" stroke-linecap="round"/>`;
  }

  // Main section scale dots
  const fStart = startFret === 0 ? 0 : startFret + 1;
  for (let f = fStart; f <= startFret + numFrets; f++) {
    for (let si = minStr; si < 6; si++) {
      if (f === 0 && si === 4) continue;
      const pitch = (STR_OPEN[si] + f) % 12;
      const intv  = (pitch - rootPc + 12) % 12;
      if (!intervals.includes(intv)) continue;
      const cx = f === 0 ? mainML - 12 : mainML + (f - startFret - 0.5) * FW;
      const cy = sy(si);
      const r  = intv === 0 ? 6 : 5.5;
      s += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${r}" fill="${color}" opacity="${intv === 0 ? 1 : 0.9}"/>`;
      if (intv === 0) s += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.5" fill="#fff"/>`;
    }
  }

  s += '</svg>';
  return s;
}

// ── Full neck map ─────────────────────────────────────────────────────────────
function mapSVG(rootPc, intervals, windows) {
  const W = 640, H = 90;
  const ML = 26, MR = 10, MT = 8, MB = 8;
  const NF = 12;
  const FW = (W - ML - MR) / NF;
  const SH = (H - MT - MB) / 5;
  const sy = syFn(MT, SH);

  function claimedBy(f, si) {
    const out = [];
    for (const shape of ['echo', 'alpha', 'delta']) {
      if (si < SHAPE_MIN_STRING[shape]) continue;
      const wv = windows[shape];
      const sw = typeof wv === 'object' ? wv.start : wv;
      const sf = typeof wv === 'object' ? wv.frets : NUM_FRETS;
      const fStart = sw === 0 ? 0 : sw + 1;
      if (f >= fStart && f <= sw + sf) out.push(shape);
    }
    return out;
  }

  function splitDot(cx, cy, r, c1, c2) {
    const [xs, ys, t, b] = [cx.toFixed(1), cy.toFixed(1), (cy-r).toFixed(1), (cy+r).toFixed(1)];
    return (
      `<path d="M ${xs} ${t} A ${r} ${r} 0 0 0 ${xs} ${b} L ${xs} ${ys} Z" fill="${c1}" opacity="0.9"/>` +
      `<path d="M ${xs} ${t} A ${r} ${r} 0 0 1 ${xs} ${b} L ${xs} ${ys} Z" fill="${c2}" opacity="0.9"/>`
    );
  }

  let s = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;

  // Fret lines (f=0 is nut)
  for (let f = 0; f <= NF; f++) {
    const x = (ML + f * FW).toFixed(1);
    const isNut = f === 0;
    s += `<line x1="${x}" y1="${MT}" x2="${x}" y2="${H - MB}" stroke="${isNut ? '#d4cfc8' : '#666'}" stroke-width="${isNut ? 9 : 2}"/>`;
  }

  // Fret position markers between strings
  [3, 5, 7, 9].forEach(f => {
    s += `<circle cx="${(ML + (f - 0.5) * FW).toFixed(1)}" cy="${(MT + 2.5 * SH).toFixed(1)}" r="3" fill="#ccc"/>`;
  });
  const x12 = ML + 11.5 * FW;
  s += `<circle cx="${x12.toFixed(1)}" cy="${(MT + SH * 1.5).toFixed(1)}" r="3" fill="#ccc"/>`;
  s += `<circle cx="${x12.toFixed(1)}" cy="${(MT + SH * 3.5).toFixed(1)}" r="3" fill="#ccc"/>`;

  // Strings
  for (let si = 0; si < 6; si++) {
    const y = sy(si).toFixed(1);
    s += `<line x1="${ML}" y1="${y}" x2="${(ML + NF * FW).toFixed(1)}" y2="${y}" stroke="#999" stroke-width="${STR_THICK[si]}" stroke-linecap="round"/>`;
  }

  // Scale dots
  for (let f = 0; f <= 12; f++) {
    for (let si = 0; si < 6; si++) {
      if (f === 0 && si === 4) continue; // skip open B string
      const pitch = (STR_OPEN[si] + f) % 12;
      const intv  = (pitch - rootPc + 12) % 12;
      if (!intervals.includes(intv)) continue;

      const cx = f === 0 ? ML - 13 : ML + (f - 0.5) * FW;
      const cy = sy(si);
      const claimed = claimedBy(f, si);

      if (claimed.length === 0) {
        continue;
      } else if (claimed.length === 1) {
        const r = intv === 0 ? 6 : 5.5;
        s += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${r}" fill="${SHAPE_COLORS[claimed[0]]}" opacity="${intv === 0 ? 1 : 0.9}"/>`;
      } else {
        s += splitDot(cx, cy, 5.5, SHAPE_COLORS[claimed[0]], SHAPE_COLORS[claimed[1]]);
      }
      if (intv === 0) s += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.5" fill="#fff"/>`;

    }
  }

  s += '</svg>';
  return s;
}

// ── Section data ──────────────────────────────────────────────────────────────
const SECTIONS = [
  {
    title:     'Minor Pentatonic',
    scaleName: 'minor pentatonic',
    key:       'F',
    rootPc:    5,
    intervals: [0, 3, 5, 7, 10],
    windows:   { echo: 0, alpha: 7, delta: 2 },
  },
  {
    title:     'Major Pentatonic',
    scaleName: 'major pentatonic',
    key:       'B',
    rootPc:    11,
    intervals: [0, 2, 4, 7, 9],
    windows:   { echo: 5, alpha: 0, delta: 8 },
  },
  {
    title:     'Natural Minor',
    scaleName: 'natural minor',
    key:       'G',
    rootPc:    7,
    intervals: [0, 2, 3, 5, 7, 8, 10],
    windows:   { echo: 2, alpha: { start: 9, frets: 4, wrap: true }, delta: 4 },
  },
  {
    title:     'Major Scale',
    scaleName: 'major',
    key:       'F#',
    rootPc:    6,
    intervals: [0, 2, 4, 5, 7, 9, 11],
    windows:   { echo: 0, alpha: 7, delta: { start: 2, frets: 5 } },
  },
  {
    title:     'Blues Scale',
    scaleName: 'blues',
    key:       'A',
    rootPc:    9,
    intervals: [0, 3, 5, 6, 7, 10],
    windows:   { echo: 4, alpha: 0, delta: 6 },
  },
];

// ── Render ────────────────────────────────────────────────────────────────────
let html = '';
SECTIONS.forEach(sec => {
  const cards = ['echo', 'alpha', 'delta'].map(shape => {
    const color  = SHAPE_COLORS[shape];
    const label  = shape[0].toUpperCase() + shape.slice(1);
    const minStr = SHAPE_MIN_STRING[shape];
    const wv     = sec.windows[shape];
    const wStart = typeof wv === 'object' ? wv.start : wv;
    const wFrets = typeof wv === 'object' ? wv.frets : NUM_FRETS;
    const wWrap  = typeof wv === 'object' ? !!wv.wrap : false;
    return `
      <div class="diag-card">
        <div class="diag-label" style="color:${color};">${label} — ${sec.key} ${sec.scaleName}</div>
        ${shapeSVG(sec.rootPc, sec.intervals, color, wStart, wFrets, minStr, wWrap)}
      </div>`;
  }).join('');

  html += `
    <div class="scale-section">
      <h2>${sec.title}</h2>
      <div class="diag-row">${cards}</div>
      <div class="diag-map">
        <div class="diag-label">Full neck — ${sec.key} ${sec.scaleName}</div>
        ${mapSVG(sec.rootPc, sec.intervals, sec.windows)}
      </div>
    </div>`;
});

document.getElementById('content').innerHTML = html;
</script>
</body>
</html>
