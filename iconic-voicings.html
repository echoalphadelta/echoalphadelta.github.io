<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconic Voicings — Echo Alpha Delta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; background: #000; }
* { box-sizing: border-box; }
body { color: #f0ede8; font-family: 'Share Tech Mono', monospace; line-height: 1.85; }
.page { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
.back-link { display: inline-block; font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: #f5a623; text-decoration: none; padding: 0.5rem 1.2rem; border: 1px solid rgba(245,166,35,0.25); border-radius: 2rem; margin-bottom: 40px; transition: all 0.3s ease; }
.back-link:hover { color: #ffc85c; border-color: rgba(245,166,35,0.5); box-shadow: 0 0 12px rgba(245,166,35,0.2); }
h1 { font-family: 'Space Mono', monospace; font-size: 1.5rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #f5a623; text-shadow: 0 0 16px rgba(245,166,35,0.4); margin: 0 0 8px 0; }
h2 { font-family: 'Space Mono', monospace; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; margin: 0 0 4px 0; }
.subname { font-family: 'Space Mono', monospace; font-size: 0.72rem; letter-spacing: 0.12em; opacity: 0.55; margin-bottom: 14px; display: block; }
p { font-size: 0.88rem; color: #c8c4be; margin: 0 0 20px 0; }
p.intro { color: #e0ddd8; margin-bottom: 40px; }
.voicing-section { margin-bottom: 56px; padding-bottom: 50px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.voicing-display { display: flex; justify-content: center; margin: 24px 0 8px; }
.voicing-box { width: 210px; }
.power-section { margin-top: 16px; }
.power-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 24px 0; }
.power-card { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.power-label { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; line-height: 1.5; }
.power-key { font-size: 0.85rem; display: block; margin-top: 2px; }
@media (max-width: 520px) { .power-row { grid-template-columns: 1fr; align-items: center; } .power-card { max-width: 200px; margin: 0 auto; } h1 { font-size: 1.1rem; } .page { padding: 24px 16px 60px; } }
</style>
</head>
<body>
<div class="page">
  <a href="index.html" class="back-link">&#8592; Back to Map</a>
  <h1>Iconic Voicings</h1>
  <p class="intro">Chord shapes that defined sounds. Nashville Numbers mark each note's relationship to the root.</p>
  <div id="content"></div>
</div>
<script>
function chordBoxSVG(o) {
  var strings=o.strings, nashville=o.nashville, startFret=o.startFret, color=o.color;
  var numFrets=4, W=168, H=210;
  var hasMarker=startFret>1, ML=hasMarker?32:16, MR=14, MT=40, MB=12;
  var fretH=(H-MT-MB)/numFrets;
  var strSpacing=(W-ML-MR)/5;
  var strX=Array.from({length:6},function(_,i){return ML+i*strSpacing;});
  var dotR=11;
  var s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" xmlns="http://www.w3.org/2000/svg">';
  s+='<rect width="'+W+'" height="'+H+'" fill="#0a0a0a" rx="3"/>';
  strX.forEach(function(x){
    s+='<line x1="'+x.toFixed(1)+'" y1="'+MT+'" x2="'+x.toFixed(1)+'" y2="'+(MT+numFrets*fretH).toFixed(1)+'" stroke="#2e2e2e" stroke-width="1"/>';
  });
  if(startFret===1){
    s+='<line x1="'+ML+'" y1="'+MT+'" x2="'+(W-MR)+'" y2="'+MT+'" stroke="#999" stroke-width="3"/>';
  } else {
    s+='<line x1="'+ML+'" y1="'+MT+'" x2="'+(W-MR)+'" y2="'+MT+'" stroke="#383838" stroke-width="1"/>';
    s+='<text x="'+(ML-5)+'" y="'+(MT+fretH*0.5).toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="9" font-family="Space Mono,monospace" fill="#555">'+startFret+'fr</text>';
  }
  for(var f=1;f<=numFrets;f++){
    var y=(MT+f*fretH).toFixed(1);
    s+='<line x1="'+ML+'" y1="'+y+'" x2="'+(W-MR)+'" y2="'+y+'" stroke="#222" stroke-width="1"/>';
  }
  strings.forEach(function(fret,i){
    var x=strX[i].toFixed(1), cy=MT-16;
    if(fret===-1){
      s+='<text x="'+x+'" y="'+(cy+4)+'" text-anchor="middle" dominant-baseline="middle" font-size="13" font-family="Space Mono,monospace" fill="#444">\u00d7</text>';
    } else if(fret===0){
      s+='<circle cx="'+x+'" cy="'+cy+'" r="8" fill="none" stroke="'+color+'" stroke-width="1.5"/>';
      if(nashville[i]){
        var fs=nashville[i].length>1?6:8;
        s+='<text x="'+x+'" y="'+cy+'" text-anchor="middle" dominant-baseline="middle" font-size="'+fs+'" font-family="Space Mono,monospace" fill="'+color+'">'+nashville[i]+'</text>';
      }
    }
  });
  strings.forEach(function(fret,i){
    if(fret<=0) return;
    var rel=fret-startFret+1;
    if(rel<1||rel>numFrets) return;
    var cx=strX[i], cy=MT+(rel-0.5)*fretH;
    s+='<circle cx="'+cx.toFixed(1)+'" cy="'+cy.toFixed(1)+'" r="'+dotR+'" fill="'+color+'" opacity="0.92"/>';
    if(nashville[i]){
      var fs=nashville[i].length>2?6:nashville[i].length>1?7:9;
      s+='<text x="'+cx.toFixed(1)+'" y="'+cy.toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" font-size="'+fs+'" font-family="Space Mono,monospace" fill="#000" font-weight="bold">'+nashville[i]+'</text>';
    }
  });
  s+='</svg>';
  return s;
}

var VOICINGS=[
  {name:'The Hendrix Chord',subname:'E7\u266f9',color:'#4a9eff',
   copy:'One of the most recognisable voicings in rock. The tension between the major third and the sharp ninth \u2014 a note that is simultaneously minor and major \u2014 gives it an unresolved, electric quality.',
   strings:[0,7,6,7,8,0],nashville:['1','1','3','7','\u266f9','1'],startFret:6},
  {name:'The James Brown Chord',subname:'G9',color:'#7c3a1f',
   copy:'Tight, percussive, and voiced high on the neck. The 9th chord is the engine of funk rhythm guitar. The stab is the point \u2014 not the sustain.',
   strings:[-1,10,9,10,10,10],nashville:['','1','3','7','9','5'],startFret:9},
];

var POWER_CHORDS=[
  {position:'Echo Position',key:'F\u266f',color:'#4a9eff',strings:[2,4,4,-1,-1,-1],nashville:['1','5','1','','',''],startFret:2},
  {position:'Alpha Position',key:'C\u266f',color:'#ff4a4a',strings:[-1,4,6,6,-1,-1],nashville:['','1','5','1','',''],startFret:3},
  {position:'Delta Position',key:'E\u266d',color:'#4aff7a',strings:[-1,-1,1,3,4,-1],nashville:['','','1','5','1',''],startFret:1},
];

function render(){
  var html='';
  VOICINGS.forEach(function(v){
    html+='<div class="voicing-section"><h2 style="color:'+v.color+';">'+v.name+'</h2><span class="subname" style="color:'+v.color+';">'+v.subname+'</span><p>'+v.copy+'</p><div class="voicing-display"><div class="voicing-box">'+chordBoxSVG(v)+'</div></div></div>';
  });
  html+='<div class="power-section"><h2 style="color:#f5a623;">Power Chords \u2014 Three Positions</h2><span class="subname" style="color:#f5a623;">Root and fifth across the three shape positions</span><p>The power chord is the foundation of rock, punk, and metal rhythm playing. Each of our three shape positions has its own natural home for the power chord. These are not named after colours \u2014 they are named after where they live on the neck.</p><div class="power-row">'+
    POWER_CHORDS.map(function(pc){
      return '<div class="power-card"><div class="power-label" style="color:'+pc.color+';">'+pc.position+'<span class="power-key">'+pc.key+'</span></div>'+chordBoxSVG(pc)+'</div>';
    }).join('')+'</div></div>';
  document.getElementById('content').innerHTML=html;
}
render();
</script>
</body>
</html>
