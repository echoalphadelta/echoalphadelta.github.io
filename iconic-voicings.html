<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconic Voicings — Echo Alpha Delta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; background: #000; }
* { box-sizing: border-box; }
body { color: #f0ede8; font-family: 'Share Tech Mono', monospace; line-height: 1.85; }
.page { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
.back-link { display: inline-block; font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: #f5a623; text-decoration: none; padding: 0.5rem 1.2rem; border: 1px solid rgba(245,166,35,0.25); border-radius: 2rem; margin-bottom: 40px; transition: all 0.3s ease; }
.back-link:hover { color: #ffc85c; border-color: rgba(245,166,35,0.5); box-shadow: 0 0 12px rgba(245,166,35,0.2); }
h1 { font-family: 'Space Mono', monospace; font-size: 1.5rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #f5a623; text-shadow: 0 0 16px rgba(245,166,35,0.4); margin: 0 0 8px 0; }
h2 { font-family: 'Space Mono', monospace; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; margin: 0 0 4px 0; }
.subname { font-family: 'Space Mono', monospace; font-size: 0.72rem; letter-spacing: 0.12em; opacity: 0.55; margin-bottom: 14px; display: block; }
p { font-size: 0.88rem; color: #c8c4be; margin: 0 0 20px 0; }
p.intro { color: #e0ddd8; margin-bottom: 40px; }
.voicing-section { margin-bottom: 56px; padding-bottom: 50px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.neck-wrap { margin: 20px 0 8px; width: 100%; }
.power-section { margin-top: 16px; }
.power-card { margin-bottom: 32px; }
.power-label { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; line-height: 1.5; margin-bottom: 8px; }
.power-key { font-size: 0.85rem; display: inline; margin-left: 8px; }
@media (max-width: 520px) { h1 { font-size: 1.1rem; } .page { padding: 24px 16px 60px; } }
</style>
</head>
<body>
<div class="page">
  <a href="index.html" class="back-link">&#8592; Back to Map</a>
  <h1>Iconic Voicings</h1>
  <p class="intro">Chord shapes that defined sounds. Nashville Numbers mark each note&#8217;s relationship to the root.</p>
  <div id="content"></div>
</div>
<script>
var STR_THICK = [3.2, 2.4, 1.7, 1.2, 0.8, 0.5];

function neckSVG(o) {
  var strings  = o.strings;   // per string: fret number (0=open, -1=not shown)
  var nashville = o.nashville;
  var color    = o.color;
  var NUM_FRETS = 12;
  var W = 600, H = 96;
  var ML = 22, MR = 8, MT = 10, MB = 18;
  var FW = (W - ML - MR) / NUM_FRETS;  // ~47.5
  var SH = (H - MT - MB) / 5;          // ~13.6
  function sy(si) { return MT + (5 - si) * SH; }
  var nTop = MT, nBot = MT + 5 * SH;

  var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" xmlns="http://www.w3.org/2000/svg">';
  s += '<rect width="' + W + '" height="' + H + '" fill="#0a0a0a" rx="2"/>';

  // String lines
  for (var si = 0; si < 6; si++) {
    var y = sy(si).toFixed(1);
    s += '<line x1="' + ML + '" y1="' + y + '" x2="' + (W - MR) + '" y2="' + y + '" stroke="#303030" stroke-width="' + STR_THICK[si] + '"/>';
  }

  // Nut
  s += '<line x1="' + ML + '" y1="' + (nTop - 2) + '" x2="' + ML + '" y2="' + (nBot + 2) + '" stroke="#999" stroke-width="3"/>';

  // Fret lines
  for (var f = 1; f <= NUM_FRETS; f++) {
    var x = (ML + f * FW).toFixed(1);
    s += '<line x1="' + x + '" y1="' + nTop + '" x2="' + x + '" y2="' + nBot + '" stroke="#1c1c1c" stroke-width="1"/>';
  }

  // Fret position markers (3, 5, 7, 9, 12)
  [3, 5, 7, 9, 12].forEach(function(f) {
    var mx = ML + (f - 0.5) * FW;
    var my = (nBot + 9).toFixed(1);
    if (f === 12) {
      s += '<circle cx="' + (mx - 5).toFixed(1) + '" cy="' + my + '" r="2.5" fill="#2a2a2a"/>';
      s += '<circle cx="' + (mx + 5).toFixed(1) + '" cy="' + my + '" r="2.5" fill="#2a2a2a"/>';
    } else {
      s += '<circle cx="' + mx.toFixed(1) + '" cy="' + my + '" r="2.5" fill="#2a2a2a"/>';
    }
  });

  // Open string circles (before nut)
  for (var si = 0; si < 6; si++) {
    if (strings[si] !== 0) continue;
    var cy = sy(si);
    var cx = ML - 11;
    s += '<circle cx="' + cx + '" cy="' + cy.toFixed(1) + '" r="5.5" fill="none" stroke="' + color + '" stroke-width="1.5"/>';
    var nn = nashville[si];
    if (nn) {
      var fs = nn.length > 1 ? 5 : 7;
      s += '<text x="' + cx + '" y="' + cy.toFixed(1) + '" text-anchor="middle" dominant-baseline="middle" font-size="' + fs + '" font-family="Space Mono,monospace" fill="' + color + '">' + nn + '</text>';
    }
  }

  // Fretted dots
  for (var si = 0; si < 6; si++) {
    var fret = strings[si];
    if (fret <= 0) continue;
    var cx = ML + (fret - 0.5) * FW;
    var cy = sy(si);
    s += '<circle cx="' + cx.toFixed(1) + '" cy="' + cy.toFixed(1) + '" r="7" fill="' + color + '" opacity="0.92"/>';
    var nn = nashville[si];
    if (nn) {
      var fs = nn.length > 2 ? 5 : nn.length > 1 ? 6 : 8;
      s += '<text x="' + cx.toFixed(1) + '" y="' + cy.toFixed(1) + '" text-anchor="middle" dominant-baseline="middle" font-size="' + fs + '" font-family="Space Mono,monospace" fill="#000" font-weight="bold">' + nn + '</text>';
    }
  }

  s += '</svg>';
  return s;
}

var VOICINGS = [
  {name: 'The Hendrix Chord', subname: '7\u266f9', color: '#9b5de5',
   copy: 'One of the most recognisable voicings. The tension between the major third and the sharp ninth \u2014 a note that is simultaneously minor and major \u2014 gives it an unresolved, electric quality.',
   strings: [-1,7,6,7,8,-1], nashville: ['','1','3','7','\u266f9','']},
  {name: 'The James Brown Chord', subname: 'G9', color: '#7c3a1f',
   copy: 'Tight, percussive, and voiced high on the neck. The stab is the point \u2014 not the sustain.',
   strings: [-1,10,9,10,10,10], nashville: ['','1','3','7','9','5']},
  {name: 'The James Bond Chord', subname: 'EmM7', color: '#b0b0c0',
   copy: 'The minor chord with a major seventh. The descending chromatic bass line \u2014 E, D\u266f, D, C\u266f \u2014 is built into the progression that begins here.',
   strings: [0,2,1,0,0,0], nashville: ['1','5','7','b3','5','1']},
];

var POWER_CHORDS = [
  {position: 'Echo Position', key: 'F\u266f', color: '#4a9eff', strings: [2,4,4,-1,-1,-1], nashville: ['1','5','1','','','']},
  {position: 'Alpha Position', key: 'C\u266f', color: '#ff4a4a', strings: [-1,4,6,6,-1,-1], nashville: ['','1','5','1','','']},
  {position: 'Delta Position', key: 'E\u266d', color: '#4aff7a', strings: [-1,-1,1,3,4,-1], nashville: ['','','1','5','1','']},
];

function render() {
  var html = '';
  VOICINGS.forEach(function(v) {
    html += '<div class="voicing-section">'
          + '<h2 style="color:' + v.color + ';">' + v.name + '</h2>'
          + '<span class="subname" style="color:' + v.color + ';">' + v.subname + '</span>'
          + '<p>' + v.copy + '</p>'
          + '<div class="neck-wrap">' + neckSVG(v) + '</div>'
          + '</div>';
  });
  html += '<div class="power-section">'
        + '<h2 style="color:#f5a623;">Power Chords \u2014 Three Positions</h2>'
        + '<span class="subname" style="color:#f5a623;">Root and fifth across the three shape positions</span>'
        + '<p>The power chord is the foundation of rhythm playing. Each of our three shape positions has its own natural home for the power chord. These are not named after colours \u2014 they are named after where they live on the neck.</p>';
  POWER_CHORDS.forEach(function(pc) {
    html += '<div class="power-card">'
          + '<div class="power-label" style="color:' + pc.color + ';">' + pc.position + '<span class="power-key">' + pc.key + '</span></div>'
          + '<div class="neck-wrap">' + neckSVG(pc) + '</div>'
          + '</div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}
render();
</script>
</body>
</html>
