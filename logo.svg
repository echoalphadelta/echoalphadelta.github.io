<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <g clip-path="url(#c)">
    <!-- Black background -->
    <rect width="100" height="100" fill="#000"/>
    <!-- Blue (Echo) band -->
    <rect x="0" y="20" width="100" height="42" fill="#4a9eff"/>
    <!-- Red (Alpha) band -->
    <rect x="0" y="66" width="100" height="19" fill="#ff4a4a"/>
    <!-- Green (Delta) band -->
    <rect x="0" y="88" width="100" height="10" fill="#4aff7a"/>
    <!-- Mountains in blue zone — Echo: two peaks, right taller -->
    <polygon points="4,62 27,28 50,62" fill="#000"/>
    <polygon points="46,62 68,20 90,62" fill="#000"/>
    <!-- Mountain in red zone — Alpha: one wide central peak -->
    <polygon points="14,85 44,67 74,85" fill="#000"/>
    <!-- Mountain in green zone — Delta -->
    <polygon points="46,97 66,88 86,97" fill="#000"/>
  </g>
</svg>
